version: "3.8"

services:
  api:
    build: ./backend
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: sqlite:///./xmeme.db
      UPLOAD_DIR: uploads
      API_PUBLIC_URL: http://localhost:8081
      FRONTEND_URL: http://localhost:8000
      SECRET_KEY: change-me-in-production
      CORS_ORIGINS: http://localhost:8000,http://localhost:8001
    volumes:
      - ./backend/uploads:/backend/uploads
      - ./backend/xmeme.db:/backend/xmeme.db

  web:
    build: ./frontend
    ports:
      - "8000:80"
    depends_on:
      - api
