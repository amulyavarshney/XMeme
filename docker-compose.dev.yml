# Local development stack (SQLite, docs enabled, hot-ish API via uvicorn)
services:
  api:
    build: ./backend
    command: uvicorn src.main:app --host 0.0.0.0 --port 8081 --reload
    environment:
      ENVIRONMENT: development
      SECRET_KEY: xmeme-dev-secret-change-me-in-production
      DATABASE_URL: sqlite:///./xmeme.db
      UPLOAD_DIR: uploads
      API_PUBLIC_URL: http://localhost:8081
      FRONTEND_URL: http://localhost:8000
      CORS_ORIGINS: http://localhost:8000,http://localhost:8001
      SEED_ON_STARTUP: "true"
      ENABLE_DOCS: "true"
      LOG_LEVEL: INFO
    volumes:
      - ./backend:/backend
      - ./backend/uploads:/backend/uploads
    ports:
      - "8081:8081"

  web:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - api
