<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="XMeme — create, post, and share memes with the world.">
  <title>XMeme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>

  <header class="site-header">
    <a class="brand" href="/">
      <img src="images/logo.png" alt="" width="40" height="40">
      <span>XMeme</span>
    </a>
    <nav class="site-nav">
      <a href="#stream">Stream</a>
      <a href="http://localhost:8081" target="_blank" rel="noopener">API Docs</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <p class="hero-brand">XMeme</p>
      <h1>Post it. Share it. Make it viral.</h1>
      <p class="hero-sub">Drop a meme URL, add a caption, and send it into the stream.</p>
    </section>

    <section class="composer" aria-labelledby="composer-title">
      <h2 id="composer-title">New meme</h2>
      <form id="meme-form" novalidate>
        <label>
          <span>Name <abbr title="required">*</abbr></span>
          <input type="text" id="owner_name" name="name" placeholder="Your name" required autocomplete="name">
        </label>
        <label>
          <span>Meme URL <abbr title="required">*</abbr></span>
          <input type="url" id="meme_url" name="url" placeholder="https://example.com/meme.jpg" required>
        </label>
        <label>
          <span>Caption <abbr title="required">*</abbr></span>
          <input type="text" id="caption" name="caption" placeholder="Something witty…" required maxlength="280">
        </label>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Post meme</button>
          <button type="reset" class="btn btn-ghost">Reset</button>
        </div>
        <p id="form-status" class="form-status" role="status" aria-live="polite"></p>
      </form>
    </section>

    <section class="stream" id="stream" aria-labelledby="stream-title">
      <div class="stream-header">
        <h2 id="stream-title">Meme stream</h2>
        <button type="button" class="btn btn-ghost btn-sm" id="refresh-btn">Refresh</button>
      </div>
      <div id="meme-grid" class="meme-grid" aria-busy="true">
        <p class="empty-state">Loading memes…</p>
      </div>
    </section>
  </main>

  <dialog id="edit-dialog" class="edit-dialog">
    <form id="edit-form" method="dialog">
      <header>
        <h2>Edit meme</h2>
        <button type="button" class="dialog-close" id="edit-close" aria-label="Close">&times;</button>
      </header>
      <label>
        <span>New URL</span>
        <input type="url" id="edit_url" name="url" placeholder="https://example.com/meme.jpg">
      </label>
      <label>
        <span>New caption</span>
        <input type="text" id="edit_caption" name="caption" placeholder="Updated caption" maxlength="280">
      </label>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="edit-submit">Save changes</button>
        <button type="button" class="btn btn-ghost" id="edit-cancel">Cancel</button>
      </div>
      <p id="edit-status" class="form-status" role="status" aria-live="polite"></p>
    </form>
  </dialog>

  <footer class="site-footer">
    <p><strong>XMeme</strong> — meme stream for creators</p>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
